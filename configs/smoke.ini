#
# smoke.ini — basic MPI smoke tests
#
# Tests: hello_world, get_version, init_finalize, comm_info, bcast
#

[ASIS TestGet:Smoke]
parent = MiddlewareBuild:OMPI
plugin = Copytree
src = @TESTS_DIR@/smoke

[TestBuild:Smoke]
parent = TestGet:Smoke
middleware = MiddlewareBuild:OMPI
plugin = Shell
command = mpicc hello_world.c -o hello_world && mpicc get_version.c -o get_version && mpicc init_finalize.c -o init_finalize && mpicc comm_info.c -o comm_info && mpicc bcast.c -o bcast

[TestRun:Smoke]
parent = TestBuild:Smoke
plugin = OpenMPI
timeout = 30
test_list = hello_world, get_version, init_finalize, comm_info, bcast
