#
# mpich.ini — MPICH test suite run against Open MPI
#

[ASIS TestGet:MPICH]
parent = MiddlewareBuild:OMPI
plugin = Git
url = https://github.com/pmodels/mpich
subdir = test/mpi

[ASIS TestBuild:MPICH]
parent = TestGet:MPICH
middleware = MiddlewareBuild:OMPI
autogen_cmd = ./autogen.sh
configure_options = CC=mpicc CXX=mpicxx F77=mpif77 FC=mpifort
make_options = -j @JOBS@
merge_stdout_stderr = 1
stderr_save_lines = 100

[TestRun:MPICH]
parent = TestBuild:MPICH
plugin = OpenMPI
timeout = 600
test_dir = "pt2pt, collective, comm, datatype, init"
max_num_tests = 50
