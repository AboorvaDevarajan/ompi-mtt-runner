#
# common.ini — shared MTT defaults, OMPI get/build, launcher, reporter
#
# Placeholders (@VAR@) are expanded by lib/mtt.sh at runtime.
#

[MTTDefaults]
trial = @TRIAL@
description = Open MPI regression test — @BRANCH@ on @HOSTNAME@
platform = @HOSTNAME@
executor = sequential
scratchdir = @SCRATCH@

[Profile:Installed]

#----------------------------------------------------------------------
# Middleware: obtain and build Open MPI
#----------------------------------------------------------------------

[ASIS MiddlewareGet:OMPI]
plugin = Git
url = https://github.com/open-mpi/ompi
branch = @BRANCH@
recursive = 1

[ASIS MiddlewareBuild:OMPI]
parent = MiddlewareGet:OMPI
plugin = Autotools
autogen_cmd = ./autogen.pl
configure_options = --disable-debug --enable-mpi1-compatibility
make_options = -j @JOBS@ install

#----------------------------------------------------------------------
# Launcher defaults for all test suites
#----------------------------------------------------------------------

[LauncherDefaults:OMPI]
plugin = OpenMPI
command = mpirun --allow-run-as-root --oversubscribe
np = @NP@
hostfile = @HOSTFILE@
merge_stdout_stderr = 1
stdout_save_lines = 100
stderr_save_lines = 100

#----------------------------------------------------------------------
# Reporters
#----------------------------------------------------------------------

[Reporter:TextFile]
plugin = TextFile
filename = @RESULTS_DIR@/summary.txt
textwrap = 78

[Reporter:JunitXML]
plugin = JunitXML
filename = @RESULTS_DIR@/junit.xml

[Reporter:IUDatabase]
plugin = IUDatabase
realm = OMPI
username = @MTT_USER@
password = @MTT_PASS@
platform = @PLATFORM@
hostname = @HOSTNAME@
url = https://mtt.open-mpi.org/submit/cpy/api/
debug_screen = true
debug_server = true
